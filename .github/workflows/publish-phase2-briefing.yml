name: Publish Phase 2 Briefing

on:
  push:
    branches:
      - main
    paths:
      - "docs/phase2_diagnostic_briefing.html"
      - "docs/assets/phase2_briefing/**"
      - ".github/workflows/publish-phase2-briefing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site bundle
        run: |
          mkdir -p site/assets
          cp docs/phase2_diagnostic_briefing.html site/index.html
          cp -R docs/assets/phase2_briefing site/assets/
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
